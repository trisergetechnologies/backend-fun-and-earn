openapi: 3.0.3
info:
  title: Auth API
  version: 1.0.0
  description: Authentication endpoints for registering and logging in users (for both `e-cart` and `shortVideo` applications)

paths:
  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user (user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [user, seller]
                  default: user
                referralCode:
                  type: string
                  description: Required only if `loginApp` is `shortVideo`
                loginApp:
                  type: string
                  enum: [e-cart, shortVideo]
                  default: e-cart
                state_address:
                  type: string
                  description: Required only if `loginApp` is `e-cart`
      responses:
        '200':
          description: Success or failure based on registration logic
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    oneOf:
                      - type: 'null'
                      - type: object
                        properties:
                          token:
                            type: string
                            description: Long-lived session JWT (15d). Required for Admin and legacy apps.
                          accessToken:
                            type: string
                            description: Short-lived access JWT (1h) for updated mobile apps.
                          refreshToken:
                            type: string
                            description: Long-lived refresh JWT (30d). Use with POST /auth/refresh.
                          expiresIn:
                            type: integer
                            example: 120
                          user:
                            type: object
                            properties:
                              id:
                                type: string
                              name:
                                type: string
                              role:
                                type: string
                              applications:
                                type: array
                                items:
                                  type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Internal Server Error
                  data:
                    type: 'null'

  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
                loginApp:
                  type: string
                  enum: [e-cart, shortVideo]
                  default: e-cart
      responses:
        '200':
          description: Success or failure based on login logic
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    oneOf:
                      - type: 'null'
                      - type: object
                        properties:
                          token:
                            type: string
                            description: Long-lived session JWT (15d). Required for Admin and legacy apps.
                          accessToken:
                            type: string
                            description: Short-lived access JWT (1h) for updated mobile apps.
                          refreshToken:
                            type: string
                            description: Long-lived refresh JWT (30d). Use with POST /auth/refresh.
                          expiresIn:
                            type: integer
                            example: 120
                          user:
                            type: object
                            properties:
                              id:
                                type: string
                              name:
                                type: string
                              role:
                                type: string
                              applications:
                                type: array
                                items:
                                  type: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Internal Server Error
                  data:
                    type: 'null'

  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token (updated mobile apps)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New access and rotated refresh tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: Alias of accessToken
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
                      expiresIn:
                        type: integer
                        example: 120
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                  data:
                    type: 'null'
